# Here we specify the development dependencies.

# The main project dependencies are specified independently in pyproject.toml.

name: conda-lock-dev
category: dev
channels:
- conda-forge
- nodefaults
dependencies:
- check-manifest
# Single-file conda binary used by the conda/conda-lock#896 reproduction
# tests in tests/test_conda_solver.py to exercise the conda-standalone
# code path -- not just mamba. Without this, the `[conda-standalone]`
# parametrization of test_pr862_corrupt_2_1_1_cache_does_not_drop_packages
# silently skips and the conda-standalone repro coverage is theater.
- conda-standalone
- docker-py
- doctr
- flaky
- freezegun
- gitpython
- mamba
- mkdocs
- mkdocs-click
- mkdocs-material
- mkdocs-include-markdown-plugin
- mypy
- pip
- pre-commit
- pytest
- pytest-cov
- pytest-split
- pytest-timeout
- pytest-xdist
- python-build
- requests-mock
- ruff
- tomli
- twine
- types-click
- types-click-default-group
- types-filelock
- types-requests
- types-toml
- types-pyyaml
- types-freezegun
- types-setuptools
- wheel
- zizmor
- pip:
  - ty